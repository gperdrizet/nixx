# Nixx — production stack
#
# Tier 2: self-contained setup (PostgreSQL included)
#   docker compose up -d
#
# Tier 3: bring-your-own PostgreSQL — comment out the postgres service and
#   set NIXX_DATABASE_URL in your .env to point at your existing instance.
#
# Ollama runs on the host (not in Docker). network_mode: host gives the
# nixx-server container direct access to localhost:11434 and any local
# postgres instance.

services:
  # ── Relational database ────────────────────────────────────────────────────
  # Remove this service if you're using an existing PostgreSQL instance.
  postgres:
    image: postgres:16-alpine
    container_name: nixx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nixx
      POSTGRES_PASSWORD: ${NIXX_POSTGRES_PASSWORD:?NIXX_POSTGRES_PASSWORD is required}
      POSTGRES_DB: nixx
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5433:5432"  # 5433 to avoid colliding with any existing local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nixx -d nixx"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Vector store ──────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: nixx-chroma
    restart: unless-stopped
    volumes:
      - ./data/memory:/chroma/chroma
    ports:
      - "8001:8000"

  # ── API server ─────────────────────────────────────────────────────────────
  nixx-server:
    build: .
    container_name: nixx-server
    restart: unless-stopped
    network_mode: host  # reaches Ollama on localhost:11434 and host postgres directly
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started

volumes:
  postgres-data:
