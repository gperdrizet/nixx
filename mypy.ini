[mypy]
python_version = 3.12
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[mypy-asyncpg]
ignore_missing_imports = true
follow_untyped_imports = true

[mypy-asyncpg.*]
ignore_missing_imports = true
follow_untyped_imports = true

[mypy-pgvector]
ignore_missing_imports = true
follow_untyped_imports = true

[mypy-pgvector.*]
ignore_missing_imports = true
follow_untyped_imports = true
