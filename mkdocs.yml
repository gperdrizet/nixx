site_name: Nixx
site_description: Building a self-hosted personal knowledge base and memory system
site_url: https://gperdrizet.github.io/nixx
repo_url: https://github.com/gperdrizet/nixx
repo_name: gperdrizet/nixx

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: teal
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      archive: true
      categories: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Build log:
    - build-log/index.md
    - 2026-03-18 - Tool call fixes and intent: build-log/2026-03-18-tool-call-fixes-and-intent.md
    - 2026-03-15 - LLM backend and TUI overhaul: build-log/2026-03-15-llm-backend-and-tui-overhaul.md
    - 2026-03-15 - Episodic memory and identity: build-log/2026-03-15-episodic-memory-and-identity.md
    - 2026-03-09 - Infrastructure and docs: build-log/2026-03-09-infrastructure-and-docs.md
    - 2026-03-07 - TUI and memory architecture: build-log/2026-03-07-tui-and-memory-architecture.md
    - 2026-03-03 - Memory system: build-log/2026-03-03-memory-system.md
    - 2026-03-02 - First working server: build-log/2026-03-02-first-working-server.md
    - 2026-02-24 - Project kickoff: build-log/2026-02-24-project-kickoff.md
  - Blog: blog/index.md
  - Docs:
    - Architecture: architecture.md
    - Stack: stack.md
    - Knowledge graph: knowledge-graph.md
  - Guides:
    - pgweb: pgweb-guide.md
    - SQL queries: queries.md
    - Phone access: phone-access.md
