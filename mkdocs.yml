site_name: Nixx
site_description: Building a self-hosted personal knowledge base and memory system
site_url: https://gperdrizet.github.io/nixx
repo_url: https://github.com/gperdrizet/nixx
repo_name: gperdrizet/nixx

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: teal
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - blog:
      blog_dir: blog
      post_date_format: long
      archive: true
      categories: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Blog: blog/index.md
  - Docs:
    - Architecture: architecture.md
    - Stack: stack.md
    - Knowledge graph: knowledge-graph.md
  - Guides:
    - pgweb: pgweb-guide.md
    - SQL queries: queries.md
    - Phone access: phone-access.md
